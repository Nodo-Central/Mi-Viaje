[versions]
agp = "9.0.1"
gson = "2.14.0"
flexbox = "3.0.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
material = "1.14.0"
activity = "1.13.0"
constraintlayout = "2.2.1"
lifecycleLivedataKtx = "2.10.0"
lifecycleViewmodelKtx = "2.10.0"
mockitoInline = "5.2.0"
navigationFragment = "2.9.8"
navigationUi = "2.9.8"
preference = "1.2.1"
robolectric = "4.16.1"
roomRuntime = "2.8.4"
